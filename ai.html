<![CDATA[
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trainer | TAZIRRA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
min-height:100vh;
background:#050505;
color:white;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#0d0d0d;
padding:30px;
border-right:1px solid #222;
}

.logo{
font-size:32px;
font-weight:bold;
margin-bottom:40px;
}

.logo span{
color:#ff9100;
}

.nav a{
display:block;
padding:12px;
margin-bottom:10px;
background:#111;
color:#ccc;
text-decoration:none;
border-radius:10px;
transition:.3s;
}

.nav a:hover,
.nav .active{
background:#ff9100;
color:black;
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
padding:30px;
height:100vh;
}

.chat-header{
margin-bottom:20px;
}

.chat-header h1{
font-size:40px;
margin-bottom:8px;
}

.chat-header p{
color:#aaa;
}

/* SUGGESTIONS */
.suggestions{
display:flex;
flex-wrap:wrap;
gap:12px;
margin-bottom:20px;
}

.suggestions button{
padding:12px 16px;
background:#111;
border:1px solid #222;
color:white;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

.suggestions button:hover{
background:#ff9100;
color:black;
}

/* CHAT */
.chat-box{
flex:1;
overflow-y:auto;
padding-right:10px;
margin-bottom:20px;
}

.message{
display:flex;
gap:12px;
margin-bottom:20px;
animation:fadeIn .3s ease;
}

.message.user{
flex-direction:row-reverse;
}

.avatar{
width:44px;
height:44px;
border-radius:50%;
background:#ff9100;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
font-size:20px;
}

.bubble{
max-width:70%;
background:#111;
border:1px solid #222;
padding:16px;
border-radius:18px;
line-height:1.6;
}

.message.user .bubble{
background:#ff9100;
color:black;
}

/* INPUT */
.input-area{
display:flex;
gap:12px;
}

.input-area input{
flex:1;
padding:16px;
border-radius:14px;
border:1px solid #222;
background:#111;
color:white;
font-size:15px;
outline:none;
}

.input-area button{
width:65px;
border:none;
border-radius:14px;
background:#ff9100;
color:black;
font-size:22px;
cursor:pointer;
}

/* ANIMATION */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */
@media(max-width:900px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
border-right:none;
border-bottom:1px solid #222;
}

.main{
padding:20px;
}

.chat-header h1{
font-size:32px;
}

.bubble{
max-width:90%;
}

}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
TAZ<span>IRRA</span>
</div>

<div class="nav">

<a href="/dashboard.html">
📊 Dashboard
</a>

<a href="/trainers.html">
🏋️ Тренери
</a>

<a href="/records.html">
📅 Мої записи
</a>

<a href="/subscription.html">
💳 Абонемент
</a>

<a href="/profile.html">
👤 Мій профіль
</a>

<a href="/ai.html" class="active">
🤖 AI Тренер
</a>

<a href="/settings.html">
⚙️ Налаштування
</a>

</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="chat-header">

<h1>
AI Trainer 🤖
</h1>

<p>
Ваш персональний AI помічник
</p>

</div>

<!-- SUGGESTIONS -->
<div class="suggestions">

<button onclick="sendSuggestion('Як набрати м\'язову масу?')">
Як набрати м'язову масу?
</button>

<button onclick="sendSuggestion('Раціон для схуднення')">
Раціон для схуднення
</button>

<button onclick="sendSuggestion('План тренувань')">
План тренувань
</button>

<button onclick="sendSuggestion('Що їсти після тренування?')">
Що їсти після тренування?
</button>

<button onclick="sendSuggestion('Як накачати прес?')">
Як накачати прес?
</button>

<button onclick="sendSuggestion('Скільки пити води?')">
Скільки пити води?
</button>

</div>

<!-- CHAT -->
<div id="chatBox" class="chat-box">

<div class="message ai">

<div class="avatar">
🤖
</div>

<div class="bubble">
Привіт 👋 Я AI Trainer клубу TAZIRRA. Допоможу з тренуваннями, харчуванням та порадами 💪
</div>

</div>

</div>

<!-- INPUT -->
<div class="input-area">

<input type="text"
id="messageInput"
placeholder="Напишіть повідомлення..."
>

<button id="sendBtn">
➤
</button>

</div>
</div>

<script>

const chatBox = document.getElementById("chatBox");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

function addMessage(text,type){

chatBox.innerHTML += `
<div class="message ${type}">
<div class="avatar">
${type === "ai" ? "🤖" : "👤"}
</div>
<div class="bubble">
${text}
</div>
</div>
`;

chatBox.scrollTop = chatBox.scrollHeight;
}

function typingAnimation(callback){

chatBox.innerHTML += `
<div class="message ai" id="typing">
<div class="avatar">🤖</div>
<div class="bubble">
Думаю...
</div>
</div>
`;

chatBox.scrollTop = chatBox.scrollHeight;

setTimeout(()=>{
document.getElementById("typing").remove();
callback();
},800);
}

function getAnswer(question){

question = question.toLowerCase();

if(question.includes("маса")){

return `
💪 Набір м'язової маси

• Профіцит калорій +300-500 ккал

• Білок 1.8-2.2 г на кг ваги

• Силові тренування 4-5 разів на тиждень

• Сон 8 годин

• Вода 2-3 літри щодня
`;
}

if(question.includes("схуд")){

return `
🔥 Схуднення

• Дефіцит калорій

• Більше білка

• Менше цукру

• Кардіо 2-3 рази на тиждень

• Контроль харчування
`;
}

if(question.includes("тренув")){

return `
🏋️ План тренувань

Понеділок:
Груди + трицепс

Середа:
Спина + біцепс

П'ятниця:
Ноги + плечі

Тривалість:
60-90 хвилин
`;
}

if(question.includes("після тренування")){

return `
🍗 Після тренування

• Курка + рис

• Омлет

• Сир

• Протеїновий коктейль

• Риба + овочі

Потрібно отримати білок протягом 1 години після тренування.
`;
}

if(question.includes("прес")){

return `
🔥 Для преса

• Планка

• Скручування

• Підйом ніг

• Велосипед

• Кардіо

Пам'ятай:
прес формується також правильним харчуванням.
`;
}

if(question.includes("вод")){

return `
💧 Вода

Для більшості людей:

30-40 мл на 1 кг ваги.

При вазі 70 кг:

≈ 2.1-2.8 літра на день.
`;
}

if(question.includes("білок")){

return `
🥩 Джерела білка

• Курка

• Індичка

• Яйця

• Сир

• Тунець

• Лосось

• Протеїн
`;
}

if(question.includes("кардіо")){

return `
🏃 Кардіо

Для здоров'я:

20-30 хвилин
3-4 рази на тиждень.

Для схуднення:

30-45 хвилин.
`;
}

return `
🤖 Я AI Trainer TAZIRRA

Я можу допомогти з:

• набором маси
• схудненням
• пресом
• харчуванням
• кардіо
• водою
• білком
• тренуваннями

Спробуйте поставити питання більш конкретно.
`;
}

function sendSuggestion(text){

addMessage(text,"user");

typingAnimation(()=>{
addMessage(getAnswer(text),"ai");
});
}

function sendMessage(){

const text = input.value.trim();

if(!text) return;

addMessage(text,"user");

input.value = "";

typingAnimation(()=>{
addMessage(getAnswer(text),"ai");
});
}

sendBtn.addEventListener("click",sendMessage);

input.addEventListener("keydown",(e)=>{
if(e.key === "Enter"){
sendMessage();
}
});

</script>

</body>
</html>
]]>
